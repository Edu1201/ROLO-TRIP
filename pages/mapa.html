<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa Interactivo — Bogotá Oculta</title>
    <link rel="stylesheet" href="../css/styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
    <style>
        /* Estilos específicos para que el mapa ocupe buena parte de la pantalla */
        #map {
            width: 100%;
            height: 70vh; /* Ajustado para que deje ver el footer abajo */
            background: #111;
        }
        .map-container {
            margin-top: 80px; /* Ajuste manual del nav-h */
            position: relative;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="navbar__logo"><a href="../index.html">Bogotá <span>Oculta</span></a></div>
        <nav class="navbar__links">
            <a href="../index.html#explorar" data-i18n="navExplore">Explorar</a>
            <a href="lugares.html" data-i18n="navPlaces">Lugares</a>
            <a href="mapa.html" data-i18n="navMap" style="color: var(--gold);">Mapa</a>
        </nav>
        <div class="lang-toggle">
            <button class="lang-btn active" id="btn-es">ES</button>
            <button class="lang-btn" id="btn-en">EN</button>
        </div>
    </header>

    <main style="margin-top: 120px; padding: 2rem;">
  <div style="max-width: 1100px; margin: 0 auto;">
    
    <div style="text-align: center; margin-bottom: 2rem;">
      <h1 style="font-family: 'Playfair Display', serif; color: white; font-size: 2.5rem;" data-i18n="navMap">Mapa Interactivo</h1>
    </div>

    <div class="filters-container" style="margin-bottom: 2rem; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;">
      <button class="btn-filter active" data-cat="todos" data-i18n="todos">Todos</button> 
      <button class="btn-filter" data-cat="sabores" data-i18n="cat1">Sabores Ocultos</button>
      <button class="btn-filter" data-cat="arte" data-i18n="cat2">Arte Urbano</button>
      <button class="btn-filter" data-cat="naturaleza" data-i18n="cat3">Naturaleza Escondida</button>
      <button class="btn-filter" data-cat="barrios" data-i18n="cat4">Barrios Emergentes</button>
      <button class="btn-filter" data-cat="mercados" data-i18n="cat6">Mercados y Plazas</button>
      <button class="btn-filter" data-cat="cafe" data-i18n="cat7">Café Local</button>
    </div>

    <div style="background: white; padding: 10px; border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); overflow: hidden;">
      <div id="map" style="width: 100%; height: 600px; border-radius: 12px;"></div>
    </div>

  </div>
</main>

    <footer class="footer-rolo">
        <div class="transmi-animation-scene">
            <div class="estacion-fondo"></div>
            <div class="transmilenio-bus"></div>
        </div>
        
        <div class="footer-content container">
            <p>Rolo Trip - Ingeniería Multimedia UNAD</p>
            <p>© 2026 | Bogotá, Colombia</p>
        </div>
    </footer>

    <script src="../js/main.js"></script>

    <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCvcP6YHB2yeBhCaKwJhKr1AiQ30DwfdW4&callback=initMap"></script>

</body>
</html>
